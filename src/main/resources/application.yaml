server:
  port: 8080

spring:
  application:
    name: sorting
  datasource:
    url: jdbc:h2:file:./data/sorting;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.sorting.entity
  configuration:
    map-underscore-to-camel-case: true

jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:default-dev-key}
    algorithm: PBEWithMD5AndDES

cdr:
  push:
    type: kafka
    batch-size: 100
    topic: cdr-record-push
  archive:
    directory-pattern: "yyyyMMdd"
  cleanup:
    file-retention-days: 7
    error-record-retention-days: 30
    cron: "0 0 2 * * ?"
